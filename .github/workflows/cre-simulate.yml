name: CRE Workflow Simulate

on:
  workflow_dispatch:
    inputs:
      broadcast:
        description: 'Broadcast to testnet (requires deployed contract)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  cre-simulate:
    name: "CRE Simulate - evmX Autonomous Rewards"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CRE dependencies
        run: cd cre-workflow && bun install

      - name: TypeScript check
        run: cd cre-workflow && bun run typecheck

      - name: Download CRE CLI
        run: |
          CRE_VERSION="v1.2.0"
          echo "Downloading CRE CLI ${CRE_VERSION}..."
          curl -sL "https://github.com/smartcontractkit/cre-cli/releases/download/${CRE_VERSION}/cre_linux_amd64.tar.gz" -o cre.tar.gz
          tar -xzf cre.tar.gz
          ls -la cre* || true
          # Find the extracted binary (may be cre or cre_linux_amd64)
          if [ -f "cre" ]; then
            chmod +x cre
            sudo mv cre /usr/local/bin/cre
          elif [ -f "cre_linux_amd64" ]; then
            chmod +x cre_linux_amd64
            sudo mv cre_linux_amd64 /usr/local/bin/cre
          else
            echo "Looking for binary..."
            find . -maxdepth 1 -type f -executable | head -5
            BINARY=$(find . -maxdepth 1 -type f -name "cre*" ! -name "*.tar.gz" | head -1)
            if [ -n "$BINARY" ]; then
              chmod +x "$BINARY"
              sudo mv "$BINARY" /usr/local/bin/cre
            fi
          fi
          cre --version || echo "CRE CLI installed (version check may not be supported)"

      - name: Run CRE Simulate (local)
        if: ${{ inputs.broadcast != 'true' }}
        working-directory: cre-workflow
        run: |
          echo "=============================================="
          echo "  evmX CRE Workflow #1 - Autonomous Rewards"
          echo "=============================================="
          cre workflow simulate \
            ./src/workflows/evmx-autonomous-rewards \
            --target local-simulation \
            2>&1 | tee ../cre-simulate-output.txt || true
          echo ""
          echo "=============================================="
          echo "  evmX CRE Workflow #3 - AI Strategy Advisor"
          echo "=============================================="
          cre workflow simulate \
            ./src/workflows/evmx-ai-advisor \
            --target local-simulation \
            2>&1 | tee -a ../cre-simulate-output.txt || true
          echo ""
          echo "=============================================="
          echo "  All CRE Simulations Complete"
          echo "=============================================="

      - name: Run CRE Simulate (broadcast to testnet)
        if: ${{ inputs.broadcast == 'true' }}
        working-directory: cre-workflow
        run: |
          echo "=============================================="
          echo "  evmX CRE Workflow - Testnet Broadcast"
          echo "=============================================="
          cre workflow simulate \
            ./src/workflows/evmx-autonomous-rewards \
            --target production-testnet \
            --broadcast \
            2>&1 | tee ../cre-simulate-output.txt || true
          echo ""
          echo "=============================================="
          echo "  Broadcast Complete"
          echo "=============================================="

      - name: Upload simulation output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cre-simulation-output
          path: cre-simulate-output.txt
