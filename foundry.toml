[profile.default]
src = "contracts"
test = "test/foundry"
libs = ["node_modules", "lib"]
solc_version = "0.8.28"
via_ir = true
optimizer = true
optimizer_runs = 50
evm_version = "paris"
gas_limit = 30_000_000
block_gas_limit = 30_000_000

# Remappings
remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
]

# Fuzz
[fuzz]
runs = 1000
max_test_rejects = 65536
seed = "0x1"

# Invariant
[invariant]
runs = 256
depth = 50
fail_on_revert = false
